name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build release binary
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build binary
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package binary
        id: package
        run: |
          PROJECT_NAME="augur"
          TARGET_DIR="target/${{ matrix.target }}/release"
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BINARY_NAME="${PROJECT_NAME}.exe"
            ASSET_NAME="${PROJECT_NAME}-${{ matrix.target }}.zip"
            cd "$TARGET_DIR"
            7z a "../../../$ASSET_NAME" "$BINARY_NAME"
            cd ../../../
          else
            BINARY_NAME="${PROJECT_NAME}"
            ASSET_NAME="${PROJECT_NAME}-${{ matrix.target }}.tar.gz"
            cd "$TARGET_DIR"
            tar czf "../../../$ASSET_NAME" "$BINARY_NAME"
            cd ../../../
          fi
          
          echo "asset_path=$ASSET_NAME" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset_path }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
